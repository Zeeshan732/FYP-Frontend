<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Parkinson</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Chart.js for admin dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Hide Chatbase widget when user is not logged in (Angular adds .user-logged-in to body) -->
  <style>
    body:not(.user-logged-in) [id*="chatbase"],
    body:not(.user-logged-in) iframe[src*="chatbase.co"],
    body:not(.user-logged-in) [class*="chatbase"] { display: none !important; visibility: hidden !important; }
  </style>
</head>
<body>
  <app-root></app-root>

  <!-- Chatbase Widget Integration (only for authenticated users) -->
  <script>
    (function () {
      var widgetLoaded = false;

      function ensureStub() {
        if (window.chatbase && window.chatbase("getState") === "initialized") {
          return;
        }
        window.chatbase = (...args) => {
          if (!window.chatbase.q) window.chatbase.q = [];
          window.chatbase.q.push(args);
        };
        window.chatbase = new Proxy(window.chatbase, {
          get(target, prop) {
            if (prop === "q") return target.q;
            return (...args) => target(prop, ...args);
          }
        });
      }

      function isLoggedIn() {
        return !!(document.body && document.body.classList.contains("user-logged-in"));
      }

      function loadWidgetIfNeeded() {
        if (widgetLoaded || !isLoggedIn()) return;
        ensureStub();
        var script = document.createElement("script");
        script.src = "https://www.chatbase.co/embed.min.js";
        script.id = "PDSdjFjROqPSHtrG9CloV";
        script.domain = "www.chatbase.co";
        document.body.appendChild(script);
        widgetLoaded = true;
      }

      function run() {
        loadWidgetIfNeeded();
      }

      if (document.readyState === "complete") {
        run();
      } else {
        window.addEventListener("load", run);
      }

      var observer = new MutationObserver(function () {
        loadWidgetIfNeeded();
      });

      if (document.body) {
        observer.observe(document.body, { attributes: true, attributeFilter: ["class"] });
      } else {
        window.addEventListener("DOMContentLoaded", function () {
          if (document.body) {
            observer.observe(document.body, { attributes: true, attributeFilter: ["class"] });
          }
        });
      }
    })();
  </script>
</body>
</html>
