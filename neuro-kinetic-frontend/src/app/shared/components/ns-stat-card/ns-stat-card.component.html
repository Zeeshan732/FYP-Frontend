<article class="ns-stat-card" [ngClass]="'ns-stat-card--' + variant">
  <div class="ns-stat-card__icon" aria-hidden="true">
    <ng-container [ngSwitch]="variant">
      <svg *ngSwitchCase="'patients'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <svg *ngSwitchCase="'high-risk'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <svg *ngSwitchCase="'at-risk'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <svg *ngSwitchCase="'healthy'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8.5 12.5 11 15l4.5-5.5"/>
      </svg>
    </ng-container>
  </div>
  <div class="ns-stat-card__copy">
    <p class="ns-stat-card__value">{{ value }}</p>
    <p class="ns-stat-card__label">{{ label }}</p>
  </div>
</article>
