<div class="pc-card" (click)="select.emit(patient.id)">
  <div class="pc-avatar"
       [style.background]="riskColor(patient.latestResult?.overallScore ?? 0) + '22'"
       [style.color]="riskColor(patient.latestResult?.overallScore ?? 0)">
    {{ patient.firstName[0] }}{{ patient.lastName[0] }}
  </div>
  <div class="pc-body">
    <div class="pc-name">{{ patient.firstName }} {{ patient.lastName }}</div>
    <div class="pc-meta">{{ patient.email }}</div>
  </div>
</div>
