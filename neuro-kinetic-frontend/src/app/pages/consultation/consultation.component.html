<div class="consultation-page">
  <main class="consultation-main">
    <section class="chat-stage chat-stage--full">
      <div *ngIf="riskPercent == null" class="consultation-notice">
        For personalized guidance, complete a screening first. You can still ask general questions here.
      </div>

      <div class="chat-container">
        <app-rag-chat
          theme="light"
          [riskPercent]="riskPercent"
          [mode]="mode"
          [showNewChatButton]="true"
          [conversationId]="conversationId"
          [useLocalDraftFallback]="false"
          (chatCleared)="startNewChat()"
          (conversationCreated)="onConversationCreated($event)"
          (conversationUnavailable)="onConversationUnavailable()">
        </app-rag-chat>
      </div>
    </section>
  </main>

  <footer class="consultation-footer">
    <p class="disclaimer">This is screening support only, not a diagnosis. Always consult a qualified healthcare provider.</p>
  </footer>
</div>
