<app-navigation></app-navigation>

<section class="profile-shell min-h-screen bg-pagebg pb-20">
  <div class="profile-inner w-full max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="profile-header mb-6">
      <h1>Profile Settings</h1>
      <p>Update your personal information and password.</p>
    </div>

    <app-skeleton *ngIf="loading" variant="table" [rows]="4" [cols]="2"></app-skeleton>

    <div *ngIf="!loading" class="profile-grid">
      <div class="app-card profile-card">
        <h3>Personal Information</h3>
        <div class="form-grid">
          <label>
            <span>First Name</span>
            <input type="text" [(ngModel)]="profile.firstName" />
          </label>
          <label>
            <span>Last Name</span>
            <input type="text" [(ngModel)]="profile.lastName" />
          </label>
          <label>
            <span>Email</span>
            <input type="email" [(ngModel)]="profile.email" disabled />
          </label>
          <label>
            <span>Role</span>
            <input type="text" [(ngModel)]="profile.role" disabled />
          </label>
          <label>
            <span>Institution</span>
            <input type="text" [(ngModel)]="profile.institution" />
          </label>
          <label>
            <span>Research Focus</span>
            <input type="text" [(ngModel)]="profile.researchFocus" />
          </label>
        </div>
        <div class="actions">
          <button type="button" class="primary" [disabled]="savingProfile" (click)="saveProfile()">
            {{ savingProfile ? 'Saving...' : 'Save Profile' }}
          </button>
        </div>
      </div>

      <div class="app-card profile-card">
        <h3>Change Password</h3>
        <div class="form-grid single">
          <label>
            <span>Current Password</span>
            <input type="password" [(ngModel)]="password.currentPassword" />
          </label>
          <label>
            <span>New Password</span>
            <input type="password" [(ngModel)]="password.newPassword" />
          </label>
          <label>
            <span>Confirm New Password</span>
            <input type="password" [(ngModel)]="password.confirmPassword" />
          </label>
        </div>
        <div class="actions">
          <button type="button" class="primary" [disabled]="changingPassword" (click)="changePassword()">
            {{ changingPassword ? 'Updating...' : 'Change Password' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
