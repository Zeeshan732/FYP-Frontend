<app-navigation></app-navigation>

<section class="profile-settings profile-shell min-h-screen bg-pagebg pb-20">
  <div class="profile-inner profile-settings__inner w-full max-w-[1400px] mx-auto">
    <header class="profile-header profile-settings__header mb-6">
      <h1 class="profile-settings__title">Profile Settings</h1>
      <p class="profile-settings__lead">Update your personal information and password.</p>
    </header>

    <div class="profile-settings__skeleton" *ngIf="loading">
      <app-skeleton variant="table" [rows]="4" [cols]="2"></app-skeleton>
    </div>

    <div *ngIf="!loading" class="profile-grid profile-settings__grid">
      <div class="app-card profile-card profile-settings__card">
        <h3 class="profile-settings__card-title">Personal Information</h3>
        <div class="form-grid">
          <label>
            <span>First Name</span>
            <input type="text" [(ngModel)]="profile.firstName" />
          </label>
          <label>
            <span>Last Name</span>
            <input type="text" [(ngModel)]="profile.lastName" />
          </label>
          <label>
            <span>Email</span>
            <input type="email" [(ngModel)]="profile.email" disabled />
          </label>
          <label>
            <span>Role</span>
            <input type="text" [(ngModel)]="profile.role" disabled />
          </label>
          <label>
            <span>Institution</span>
            <input type="text" [(ngModel)]="profile.institution" />
          </label>
          <label>
            <span>Research Focus</span>
            <input type="text" [(ngModel)]="profile.researchFocus" />
          </label>
        </div>
        <div class="actions profile-settings__actions">
          <button type="button" class="primary profile-settings__btn" [disabled]="savingProfile" (click)="saveProfile()">
            {{ savingProfile ? 'Saving...' : 'Save Profile' }}
          </button>
        </div>
      </div>

      <div class="app-card profile-card profile-settings__card">
        <h3 class="profile-settings__card-title">Change Password</h3>
        <div class="form-grid single">
          <label>
            <span>Current Password</span>
            <input
              type="password"
              name="currentPassword"
              [(ngModel)]="password.currentPassword"
              autocomplete="current-password" />
          </label>
          <label>
            <span>New Password</span>
            <input
              type="password"
              name="newPassword"
              [(ngModel)]="password.newPassword"
              autocomplete="new-password" />
          </label>
          <label>
            <span>Confirm New Password</span>
            <input
              type="password"
              name="confirmNewPassword"
              [(ngModel)]="password.confirmPassword"
              autocomplete="new-password" />
          </label>
        </div>
        <div class="actions profile-settings__actions">
          <button type="button" class="primary profile-settings__btn" [disabled]="changingPassword" (click)="changePassword()">
            {{ changingPassword ? 'Updating...' : 'Change Password' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
