<section class="min-h-screen bg-gradient-to-br from-slate-900 via-gray-900 to-slate-800 pt-28 pb-20">
  <div class="container mx-auto px-4">
    <div class="max-w-xl mx-auto backdrop-blur-md bg-white/10 border border-white/20 rounded-2xl p-8 shadow-2xl text-center">
      <h1 class="text-3xl font-bold text-white mb-3">Password Reset Moved</h1>
      <p class="text-gray-300 mb-6">
        This standalone reset page is no longer used.
        Please use the "Forgot password?" action in the login modal.
      </p>
      <button
        (click)="goToLogin()"
        class="inline-flex items-center justify-center px-6 py-3 rounded-lg bg-app-primary text-white font-semibold hover:bg-app-primary-hover transition-colors">
        Back to Login
      </button>
    </div>
  </div>
</section>
