<section class="min-h-screen bg-gradient-to-br from-slate-900 via-gray-900 to-slate-800 flex items-center justify-center">
  <div class="max-w-md mx-auto px-4">
    <div class="backdrop-blur-md bg-white/10 border border-white/20 rounded-2xl p-8 shadow-2xl text-center">
      <div *ngIf="loading" class="space-y-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-400 mx-auto"></div>
        <h2 class="text-2xl font-bold text-white">Completing Sign In...</h2>
        <p class="text-gray-300">Please wait while we authenticate your account.</p>
      </div>
      
      <div *ngIf="error" class="space-y-4">
        <div class="text-red-400 text-5xl mb-4">⚠️</div>
        <h2 class="text-2xl font-bold text-white">Authentication Failed</h2>
        <p class="text-gray-300">{{ error }}</p>
        <p class="text-sm text-gray-400">Redirecting to login page...</p>
      </div>
    </div>
  </div>
</section>
