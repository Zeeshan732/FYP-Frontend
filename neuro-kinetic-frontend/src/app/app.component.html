<!-- Navigation Component (Navbar or Sidebar based on route) -->
<app-navigation></app-navigation>

<!-- Header Component (shown when authenticated) -->
<app-header></app-header>

<div [class.ml-56]="isAuthenticated && !sidebarCollapsed && !isCompactViewport && currentRoute !== '/landing' && currentRoute !== '/'"
     [class.ml-20]="isAuthenticated && sidebarCollapsed && !isCompactViewport && currentRoute !== '/landing' && currentRoute !== '/'"
     [class.pt-16]="isAuthenticated && currentRoute !== '/landing' && currentRoute !== '/'"
     [class.app-shell--compact-auth]="isAuthenticated && isCompactViewport && currentRoute !== '/landing' && currentRoute !== '/'"
     [class.app-shell--fab-safe]="isAuthenticated && isCompactViewport && currentRoute !== '/landing' && currentRoute !== '/'"
     class="app-shell transition-all duration-300 ease-in-out">
  <router-outlet></router-outlet>
</div>

<!-- Global notice (e.g. password reset OTP expired) -->
<p-dialog
  [visible]="globalNotice.visible"
  (visibleChange)="onGlobalNoticeVisible($event)"
  [header]="globalNotice.title"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [dismissableMask]="true"
  [style]="{ width: 'min(440px, 94vw)' }"
  styleClass="app-global-notice-dialog">
  <p class="app-global-notice-text">{{ globalNotice.message }}</p>
  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      label="OK"
      class="p-button-sm"
      (click)="closeGlobalNotice()"></button>
  </ng-template>
</p-dialog>

<!-- PrimeNG Confirm Popup (automatically injected by ConfirmationService) -->
<p-confirmPopup></p-confirmPopup>

<!-- Modal Components -->
<app-login-modal></app-login-modal>
<app-signup-modal></app-signup-modal>
<app-ask-results-dialog
  [visible]="askResultsDialogState.visible"
  [riskPercent]="askResultsDialogState.riskPercent"
  [mode]="askResultsDialogState.mode"
  (visibleChange)="onAskResultsDialogClose()">
</app-ask-results-dialog>

<!-- Toast last in DOM + high z-index so it stays above modals and centers correctly on mobile -->
<p-toast position="top-center" [baseZIndex]="12000" [life]="2000"></p-toast>
