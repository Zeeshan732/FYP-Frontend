<!-- Top Navbar (Public/Not Authenticated OR Landing Page, but NOT Login/Signup) — NeuroSync Dark -->
<nav *ngIf="(!isAuthenticated || isLandingPage) && currentRoute !== '/login' && currentRoute !== '/signup'" 
     class="navbar"
     [class.-translate-y-full]="!isNavbarVisible"
     [class.scrolled]="isScrolled">
  <div class="navbar-inner">
    <a routerLink="/landing" class="navbar-brand">
      <img src="assets/logos/brand/logo.png" alt="NeuroSync" class="brand-logo-img">
    </a>
    <div class="navbar-links">
      <a routerLink="/landing" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/about" routerLinkActive="active">About</a>
      <a routerLink="/blog" routerLinkActive="active">Blog</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </div>
    <div class="navbar-actions">
      <button type="button" (click)="openLoginModal()" class="btn-ghost">Login</button>
      <button type="button" (click)="openSignupModal()" class="btn-primary">Sign Up</button>
    </div>
    <button
      type="button"
      class="mobile-menu-btn"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="mobileMenuOpen"
      aria-label="Toggle menu"
    >
      <span class="hamburger" [class.open]="mobileMenuOpen" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>
  <!-- Mobile menu dropdown -->
  <div *ngIf="mobileMenuOpen" class="navbar-mobile-menu">
    <a routerLink="/landing" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Home</a>
    <a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">About</a>
    <a routerLink="/blog" routerLinkActive="active" (click)="closeMobileMenu()">Blog</a>
    <a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()">Contact</a>
    <button type="button" (click)="openLoginModal()" class="btn-ghost">Login</button>
    <button type="button" (click)="openSignupModal()" class="btn-primary">Sign Up</button>
  </div>
</nav>

<!-- Mobile Sidebar Toggle -->
<button
  *ngIf="isAuthenticated && !isLandingPage && currentRoute !== '/login' && currentRoute !== '/signup' && !mobileSidebarOpen"
  type="button"
  class="mobile-sidebar-toggle"
  (click)="toggleSidebar()"
  aria-label="Open menu"
>
  <svg class="mobile-sidebar-toggle__icon" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
  </svg>
</button>

<!-- Backdrop for mobile sidebar -->
<div
  *ngIf="isAuthenticated && !isLandingPage && currentRoute !== '/login' && currentRoute !== '/signup' && mobileSidebarOpen"
  class="mobile-sidebar-backdrop"
  (click)="closeMobileSidebar()"
></div>

<!-- Sidebar (Authenticated Users - NOT on Landing/Login/Signup Pages) -->
<aside *ngIf="isAuthenticated && !isLandingPage && currentRoute !== '/login' && currentRoute !== '/signup'"
       class="neuro-sidebar neuro-sidebar--v2 fixed left-0 top-0 h-full z-[65] transition-all duration-300 ease-in-out"
       [class.w-56]="!sidebarCollapsed"
       [class.w-20]="sidebarCollapsed"
       [class.mobile-open]="mobileSidebarOpen"
       [attr.data-collapsed]="sidebarCollapsed">
  <div class="neuro-sidebar__inner flex flex-col h-full">
    <!-- Brand + collapse -->
    <div class="neuro-sidebar__header">
      <div class="neuro-sidebar__brand">
        <div class="neuro-sidebar__logo-wrap">
          <img src="assets/logos/brand/logo.png" alt="NeuroSync" class="neuro-sidebar__logo-img">
        </div>
        <div *ngIf="roleLabel && !sidebarCollapsed" class="neuro-sidebar__role-chip">{{ roleLabel }}</div>
      </div>
      <button *ngIf="!isMobile"
              type="button"
              (click)="toggleSidebar()"
              class="neuro-sidebar__collapse"
              [attr.aria-expanded]="!sidebarCollapsed"
              aria-label="Collapse sidebar">
        <svg class="neuro-sidebar__collapse-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" [class.neuro-sidebar__collapse-icon--flipped]="sidebarCollapsed">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
        </svg>
      </button>
      <button *ngIf="isMobile"
              type="button"
              (click)="closeMobileSidebar()"
              class="neuro-sidebar__close"
              aria-label="Close menu">
        <svg class="neuro-sidebar__close-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <nav class="neuro-sidebar__nav flex-1 flex flex-col overflow-y-auto overscroll-contain">
      <!-- Patient -->
      <ng-container *ngIf="isPatient">
        <a routerLink="/home"
           routerLinkActive="neuro-sidebar__link--active"
           [routerLinkActiveOptions]="{exact: true}"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Home' : ''">
          <i class="pi pi-home neuro-sidebar__icon" aria-hidden="true"></i>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Home</span>
        </a>

        <a routerLink="/patient-test"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Take Test' : ''">
          <i class="pi pi-microphone neuro-sidebar__icon" aria-hidden="true"></i>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Take Test</span>
        </a>

        <a routerLink="/test-records"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'My Tests' : ''">
          <i class="pi pi-file neuro-sidebar__icon" aria-hidden="true"></i>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">My Tests</span>
        </a>

        <a routerLink="/consultation"
           (click)="onConsultationClick($event)"
           class="neuro-sidebar__link neuro-sidebar__link--full"
           [title]="sidebarCollapsed ? 'Consultation' : ''">
          <i class="pi pi-question-circle neuro-sidebar__icon" aria-hidden="true"></i>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Consultation</span>
        </a>

        <a routerLink="/chat-history"
           (click)="onChatHistoryClick()"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Chat History' : ''">
          <i class="pi pi-comments neuro-sidebar__icon" aria-hidden="true"></i>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Chat History</span>
        </a>

        <a routerLink="/profile-settings"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Profile Settings' : ''">
          <i class="pi pi-user-edit neuro-sidebar__icon" aria-hidden="true"></i>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Profile Settings</span>
        </a>
      </ng-container>

      <!-- Clinician -->
      <ng-container *ngIf="isClinician">
        <a routerLink="/clinician"
           routerLinkActive="neuro-sidebar__link--active"
           [routerLinkActiveOptions]="{exact: true}"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Dashboard' : ''">
          <svg class="neuro-sidebar__icon-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Dashboard</span>
        </a>

        <a routerLink="/clinician/results"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Test Results' : ''">
          <svg class="neuro-sidebar__icon-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4"></path>
          </svg>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Test Results</span>
        </a>

        <a routerLink="/notifications"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Notifications' : ''">
          <svg class="neuro-sidebar__icon-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Notifications</span>
        </a>

        <a routerLink="/profile-settings"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Profile Settings' : ''">
          <i class="pi pi-user-edit neuro-sidebar__icon" aria-hidden="true"></i>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Profile Settings</span>
        </a>
      </ng-container>

      <!-- Admin -->
      <ng-container *ngIf="isAdmin">
        <a routerLink="/admin-dashboard"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Admin Dashboard' : ''">
          <svg class="neuro-sidebar__icon-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Dashboard</span>
        </a>
        <a *ngIf="isAdmin" routerLink="/account-requests"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Account Requests' : ''">
          <svg class="neuro-sidebar__icon-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h4m6 0h4a7 7 0 00-7-7z" />
          </svg>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Account Requests</span>
        </a>
        <a *ngIf="isAdmin" routerLink="/admin-users"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'All Users' : ''">
          <svg class="neuro-sidebar__icon-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">All Users</span>
        </a>
        <a *ngIf="isAdmin" routerLink="/contact-messages"
           routerLinkActive="neuro-sidebar__link--active"
           class="neuro-sidebar__link"
           [title]="sidebarCollapsed ? 'Contact Messages' : ''">
          <i class="pi pi-inbox neuro-sidebar__icon" aria-hidden="true"></i>
          <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Contact Messages</span>
        </a>
      </ng-container>

      <a routerLink="/contact"
         routerLinkActive="neuro-sidebar__link--active"
         class="neuro-sidebar__link neuro-sidebar__link--contact"
         [title]="sidebarCollapsed ? 'Contact' : ''">
        <i class="pi pi-envelope neuro-sidebar__icon" aria-hidden="true"></i>
        <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Contact</span>
      </a>
    </nav>

    <div class="neuro-sidebar__footer">
      <button type="button"
              (click)="logout()"
              class="neuro-sidebar__link neuro-sidebar__link--logout"
              [title]="sidebarCollapsed ? 'Logout' : ''">
        <i class="pi pi-sign-out neuro-sidebar__icon" aria-hidden="true"></i>
        <span [class.hidden]="sidebarCollapsed" class="neuro-sidebar__label">Logout</span>
      </button>
    </div>
  </div>
</aside>
