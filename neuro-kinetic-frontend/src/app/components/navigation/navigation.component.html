<!-- Top Navbar (Public/Not Authenticated OR Landing Page, but NOT Login/Signup) -->
<nav *ngIf="(!isAuthenticated || isLandingPage) && currentRoute !== '/login' && currentRoute !== '/signup'" 
     class="fixed w-full top-0 z-50 transition-transform duration-300 ease-in-out" 
     [class.-translate-y-full]="!isNavbarVisible"
     [class.scrolled]="isScrolled">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="backdrop-blur-md bg-white/60 border-b border-white/20 rounded-2xl mx-4 lg:mx-8 mt-3 navbar-container">
      <div class="flex justify-between items-center py-3 px-4 lg:px-6">
        <!-- Logo -->
        <div class="flex items-center">
          <a routerLink="/landing" class="text-2xl font-bold text-app-primary hover:opacity-90 transition-colors">
           NeuroSync
          </a>
        </div>

        <!-- Desktop Navigation (public) -->
        <div class="hidden md:flex items-center space-x-6">
          <a routerLink="/landing" 
routerLinkActive="text-app-primary"
             [routerLinkActiveOptions]="{exact: true}"
             class="text-gray-700 hover:text-app-primary transition-colors font-medium">
            Home
          </a>
          <a routerLink="/contact" 
routerLinkActive="text-app-primary"
             class="text-gray-700 hover:text-app-primary transition-colors font-medium">
            Contact
          </a>

          <!-- Auth Buttons -->
          <div class="flex items-center space-x-4 pl-4 border-l border-gray-300">
            <button (click)="openLoginModal()" 
                    class="text-gray-700 hover:text-app-primary transition-colors font-medium">
              Login
            </button>
            <button (click)="openSignupModal()" 
                    class="bg-app-primary text-white px-4 py-2 rounded-app hover:bg-app-primary-hover transition-colors font-medium">
              Sign Up
            </button>
          </div>
        </div>

        <!-- Mobile Menu Button -->
        <div class="md:hidden">
          <button (click)="toggleMobileMenu()" 
                  class="text-gray-700 hover:text-app-primary focus:outline-none focus:text-app-primary">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path *ngIf="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              <path *ngIf="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Mobile Navigation -->
      <div *ngIf="mobileMenuOpen" class="md:hidden pb-4 px-4">
        <div class="flex flex-col space-y-4 pt-4 border-t border-gray-200">
          <a routerLink="/landing" 
             routerLinkActive="text-app-primary" 
             [routerLinkActiveOptions]="{exact: true}"
             (click)="closeMobileMenu()"
             class="text-gray-700 hover:text-app-primary transition-colors font-medium">
            Home
          </a>
          <a routerLink="/contact" 
             routerLinkActive="text-app-primary" 
             (click)="closeMobileMenu()"
             class="text-gray-700 hover:text-app-primary transition-colors font-medium">
            Contact
          </a>
          <div class="flex flex-col space-y-2 pt-4 border-t border-gray-200">
            <button (click)="openLoginModal()" 
                    class="text-gray-700 hover:text-app-primary transition-colors font-medium text-left">
              Login
            </button>
            <button (click)="openSignupModal()" 
                    class="bg-app-primary text-white px-4 py-2 rounded-app hover:bg-app-primary-hover transition-colors font-medium text-center">
              Sign Up
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Mobile Sidebar Toggle -->
<button
  *ngIf="isAuthenticated && !isLandingPage && currentRoute !== '/login' && currentRoute !== '/signup' && !mobileSidebarOpen"
  class="mobile-sidebar-toggle"
  (click)="toggleSidebar()"
  aria-label="Toggle sidebar"
>
  <svg class="w-5 h-5" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
  </svg>
</button>

<!-- Backdrop for mobile sidebar -->
<div
  *ngIf="isAuthenticated && !isLandingPage && currentRoute !== '/login' && currentRoute !== '/signup' && mobileSidebarOpen"
  class="mobile-sidebar-backdrop"
  (click)="toggleSidebar()"
></div>

<!-- Sidebar (Authenticated Users - NOT on Landing/Login/Signup Pages) -->
<aside *ngIf="isAuthenticated && !isLandingPage && currentRoute !== '/login' && currentRoute !== '/signup'" 
       class="fixed left-0 top-0 h-full z-50 bg-white border-r border-app-border transition-all duration-300 ease-in-out shadow-sm"
       [class.w-64]="!sidebarCollapsed"
       [class.w-20]="sidebarCollapsed"
       [class.mobile-open]="mobileSidebarOpen">
  <!-- Sidebar Content -->
  <div class="flex flex-col h-full">
    <!-- Sidebar Header -->
    <div class="flex items-center p-4 border-b border-app-border relative">
      <div class="flex items-center space-x-3" [class.opacity-0]="sidebarCollapsed" [class.w-0]="sidebarCollapsed" [class.overflow-hidden]="sidebarCollapsed">
        <div class="flex flex-col">
          <div class="text-xl font-bold text-app-primary whitespace-nowrap">NeuroSync</div>
          <div *ngIf="roleLabel" class="text-[11px] uppercase tracking-wide text-app-text-muted">{{ roleLabel }}</div>
        </div>
      </div>
      <div class="flex-1"></div>
      <div class="flex items-center gap-2">
        <button (click)="toggleSidebar()" 
                class="p-2 rounded-lg hover:bg-app-surface-muted text-gray-600 hover:text-app-text-primary transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" [class.rotate-180]="sidebarCollapsed">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Navigation Links: single flat list, role-based visibility -->
    <nav class="flex-1 overflow-y-auto p-4 space-y-2">
      <a [routerLink]="isAdmin ? '/admin-dashboard' : '/home'" 
         routerLinkActive="bg-app-primary/20 text-app-primary border-app-primary"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group"
         [title]="sidebarCollapsed ? 'Home' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">Home</span>
      </a>

      <a routerLink="/patient-test" 
         routerLinkActive="bg-app-primary/20 text-app-primary border-app-primary"
         class="flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group"
         [title]="sidebarCollapsed ? 'Take Test' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">Take Test</span>
      </a>

      <a routerLink="/test-records" 
         routerLinkActive="bg-app-primary/20 text-app-primary border-app-primary"
         class="flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group"
         [title]="sidebarCollapsed ? 'My Tests' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">My Tests</span>
      </a>

      <a *ngIf="!isAdmin" routerLink="/live-voice-monitor" 
         routerLinkActive="bg-app-primary/20 text-app-primary border-app-primary"
         class="flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group"
         [title]="sidebarCollapsed ? 'Live Voice Monitor' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">Live Monitor</span>
      </a>

      <a routerLink="/notifications"
         routerLinkActive="bg-app-primary/20 text-app-primary border-app-primary"
         class="flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group"
         [title]="sidebarCollapsed ? 'Notifications' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">Notifications</span>
      </a>

      <button type="button"
              (click)="openAskResultsDialog()"
              class="w-full flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group text-left"
              [title]="sidebarCollapsed ? 'Ask about your results' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">Ask about your results</span>
      </button>

      <!-- Admin only -->
      <a *ngIf="isAdmin" routerLink="/admin-dashboard" 
         routerLinkActive="bg-app-primary/20 text-app-primary border-app-primary"
         class="flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group"
         [title]="sidebarCollapsed ? 'Admin Dashboard' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">Dashboard</span>
      </a>
      <a *ngIf="isAdmin" routerLink="/account-requests" 
         routerLinkActive="bg-app-primary/20 text-app-primary border-app-primary"
         class="flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group"
         [title]="sidebarCollapsed ? 'Account Requests' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h4m6 0h4a7 7 0 00-7-7z" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">Account Requests</span>
      </a>
      <a *ngIf="isAdmin" routerLink="/admin-users" 
         routerLinkActive="bg-app-primary/20 text-app-primary border-app-primary"
         class="flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group"
         [title]="sidebarCollapsed ? 'All Users' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">All Users</span>
      </a>

      <a routerLink="/contact" 
         routerLinkActive="bg-app-primary/20 text-app-primary border-app-primary"
         class="flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-app-surface-muted hover:text-app-text-primary transition-colors group mt-2"
         [title]="sidebarCollapsed ? 'Contact' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">Contact</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="p-4 border-t border-app-border">
      <button (click)="logout()" 
              class="w-full flex items-center space-x-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors group"
              [title]="sidebarCollapsed ? 'Logout' : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span [class.hidden]="sidebarCollapsed" class="whitespace-nowrap">Logout</span>
      </button>
    </div>
  </div>

  <!-- Notification dropdown removed per request -->
</aside>
