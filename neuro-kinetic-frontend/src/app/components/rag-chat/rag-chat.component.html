<div class="rag-chat" [class.rag-chat--light]="theme === 'light'">
  <div class="rag-chat-header">
    <div *ngIf="riskPercent == null && theme !== 'light'" class="rag-notice">
      For personalized guidance, complete a screening first. You can still ask general questions here.
    </div>
    <button type="button" class="rag-btn-new-chat" (click)="newChat()" title="Start a new conversation">
      <span class="rag-btn-new-chat-icon" aria-hidden="true">+</span>
      New chat
    </button>
  </div>

  <div class="rag-messages" [class.rag-messages--empty]="theme === 'light' && messages.length === 0">
    <p *ngIf="theme === 'light' && messages.length === 0" class="rag-welcome">What can I help with?</p>
    <p *ngIf="theme !== 'light' && messages.length === 0" class="rag-placeholder">Ask a question about your screening result, risk level, or general guidance.</p>
    <div *ngFor="let msg of messages" class="rag-msg" [class.rag-msg--sent]="msg.reply">
      <div class="rag-msg-bubble">
        <span *ngIf="!msg.reply" class="rag-msg-sender">{{ msg.sender }}</span>
        <div class="rag-msg-text">{{ msg.text }}</div>
      </div>
    </div>
    <!-- Typing indicator (left side) – no loader, no green -->
    <div *ngIf="loading" class="rag-msg rag-msg--loader">
      <div class="rag-msg-bubble rag-msg-bubble--typing">
        <span class="rag-msg-sender">NeuroSync</span>
        <span class="rag-typing">typing....</span>
      </div>
    </div>
  </div>

  <div class="rag-form" [class.rag-form--light]="theme === 'light'">
    <ng-container *ngIf="theme === 'light'">
      <div class="rag-input-wrap">
        <input
          type="text"
          [(ngModel)]="inputMessage"
          (keydown.enter)="$event.preventDefault(); sendMessage()"
          placeholder="Ask anything"
          [disabled]="loading"
          class="rag-input rag-input--inside" />
        
      </div>

      <button type="button" (click)="sendMessage()" [disabled]="loading || !inputMessage.trim()" class="rag-input-icon rag-input-icon--send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="currentColor" class="rag-icon-send-arrow"><path d="M4 12l8-8 8 8h-5v8h-6v-8H4z"/></svg>
      </button>
    </ng-container>
    <ng-container *ngIf="theme !== 'light'">
      <input
        type="text"
        [(ngModel)]="inputMessage"
        (keydown.enter)="$event.preventDefault(); sendMessage()"
        placeholder="Type a message"
        [disabled]="loading"
        class="rag-input" />
      <button type="button" (click)="sendMessage()" [disabled]="loading" class="rag-send">
        {{ loading ? '…' : 'Send' }}
      </button>
    </ng-container>
  </div>

  <div *ngIf="error" class="rag-error">{{ error }}</div>
  <button *ngIf="messages.length > 0" type="button" (click)="newChat()" class="rag-clear">New chat</button>
</div>
