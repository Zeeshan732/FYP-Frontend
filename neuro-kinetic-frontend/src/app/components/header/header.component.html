<div *ngIf="currentUser && !isLandingPage" 
     class="neuro-header fixed top-0 z-50 backdrop-blur-md shadow-sm transition-all duration-300 ease-in-out"
     [class.h-16]="!isCompactViewport"
     [class.neuro-header--compact]="isCompactViewport"
     [class.left-56]="!sidebarCollapsed && !isCompactViewport"
     [class.left-20]="sidebarCollapsed && !isCompactViewport"
     [class.right-0]="true"
     [style.width]="isCompactViewport ? '100%' : (!sidebarCollapsed ? 'calc(100% - 224px)' : 'calc(100% - 80px)')">
  <div class="header-inner flex items-center justify-between min-w-0"
       [class.header-inner--desktop]="!isCompactViewport"
       [class.header-inner--compact]="isCompactViewport">
    <!-- Breadcrumb Path -->
    <div class="flex items-center space-x-2 flex-1 min-w-0">
      <svg class="text-blue flex-shrink-0 header-home-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      <span class="header-breadcrumb text-ink text-sm truncate">{{ breadcrumbPath }}</span>
    </div>

    <!-- Actions + User Badge -->
    <div class="flex items-center gap-2 sm:gap-3 ml-2 sm:ml-4 shrink-0">
      <!-- Notifications dropdown -->
      <div class="notif-dropdown-host relative" #notifDropdownHost>
        <button
          type="button"
          class="neuro-header-icon relative rounded-lg transition-colors"
          [class.neuro-header-icon--compact]="isCompactViewport"
          (click)="toggleNotificationsDropdown($event)"
          [attr.aria-expanded]="notificationsDropdownOpen"
          aria-haspopup="true"
          title="Notifications"
        >
          <svg class="header-action-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
          <span *ngIf="unreadCount > 0" class="notif-badge-num">
            {{ unreadCount > 99 ? '99+' : unreadCount }}
          </span>
        </button>

        <div
          *ngIf="notificationsDropdownOpen"
          class="notif-dropdown-panel"
          role="menu"
          (click)="$event.stopPropagation()"
        >
          <div class="notif-dropdown-head">
            <span>Notifications</span>
            <button type="button" class="notif-link-btn" (click)="markAllPreviewRead()">Mark read</button>
          </div>
          <div class="notif-dropdown-empty" *ngIf="notificationPreview.length === 0">
            No notifications yet.
          </div>
          <ul class="notif-dropdown-list" *ngIf="notificationPreview.length > 0">
            <li *ngFor="let note of notificationPreview">
              <button
                type="button"
                class="notif-dropdown-item"
                [class.unread]="notificationsService.isUnread(note)"
                (click)="onPreviewItemClick(note, $event)"
              >
                <span class="notif-item-msg">{{ note.message }}</span>
                <span class="notif-item-time">{{ formatRelativeTime(note.createdAt) }}</span>
              </button>
            </li>
          </ul>
          <div class="notif-dropdown-foot">
            <button type="button" class="notif-foot-btn" (click)="goToNotificationsPage()">
              View all
            </button>
          </div>
        </div>
      </div>

      <!-- User Info + Avatar -->
      <div class="flex items-center space-x-3">
        <div class="text-right" [class.hidden]="sidebarCollapsed || isCompactViewport">
          <div class="text-ink text-sm font-medium truncate max-w-[150px]">{{ getUserDisplayName() }}</div>
          <!-- <div class="text-gray-400 text-xs truncate max-w-[150px]">{{ currentUser?.email }}</div> -->
          <div *ngIf="isAdmin()" class="mt-0.5">
            <span class="px-2 py-0.5 bg-red-500/20 text-red-400 rounded text-xs font-semibold">Admin</span>
          </div>
        </div>
        
        <div class="relative">
          <button 
            type="button"
            (click)="navigateToProfile()"
            class="rounded-full bg-blue hover:bg-navy flex items-center justify-center text-white font-medium transition-colors cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue focus:ring-offset-2 focus:ring-offset-surface header-avatar-btn"
            [class.header-avatar-btn--compact]="isCompactViewport"
            [title]="getUserDisplayName()">
            {{ getUserInitials() }}
          </button>
          
          <!-- Online Status Indicator -->
          <span class="absolute bg-green-500 border-2 border-[var(--color-sidebar-bg)] rounded-full header-avatar-status"
                [class.header-avatar-status--compact]="isCompactViewport"></span>
        </div>
      </div>
    </div>
  </div>
</div>
