<div *ngIf="isOpen" class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-content">
    <div class="ns-card">
      <div class="ns-topbar">
        <div class="ns-logo">
          <img src="assets/logos/brand/logo.png" alt="NeuroSync" class="ns-logo-img">
        </div>
        <button class="ns-close" type="button" (click)="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="ns-body">
        <span class="ns-tag">• Free account</span>
        <h2 class="ns-title">Create your account</h2>
        <p class="ns-sub">Join NeuroSync to start your neurological assessments</p>

        <div *ngIf="info" class="ns-msg ns-info">{{ info }}</div>
        <div *ngIf="error" class="ns-msg ns-error">{{ error }}</div>

        <div class="ns-role-head">I am a</div>
        <div class="ns-role-grid">
          <button type="button"
                  class="ns-role-card"
                  [class.selected]="selectedRole === 'patient'"
                  (click)="selectRole('patient')">
            <span class="ns-role-icon ns-role-blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="3"></circle>
                <path d="M6 19a6 6 0 0112 0"></path>
              </svg>
            </span>
            <span class="ns-role-text">
              <span class="ns-role-title">Patient</span>
              <span class="ns-role-sub">Take tests</span>
            </span>
          </button>

          <button type="button"
                  class="ns-role-card ns-role-dark"
                  [class.selected]="selectedRole === 'clinician'"
                  (click)="selectRole('clinician')">
            <span class="ns-role-icon ns-role-green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 12 7 12 10 5 14 19 17 12 21 12"></polyline>
              </svg>
            </span>
            <span class="ns-role-text">
              <span class="ns-role-title">Clinician</span>
              <span class="ns-role-sub">Manage patients</span>
            </span>
          </button>
        </div>

        <form (ngSubmit)="onSubmit()" class="ns-form">
          <div class="ns-two">
            <div class="ns-field">
              <label>First name</label>
              <input type="text" [(ngModel)]="firstName" name="firstName" placeholder="Ali" [disabled]="loading" required>
            </div>
            <div class="ns-field">
              <label>Last name</label>
              <input type="text" [(ngModel)]="lastName" name="lastName" placeholder="Ahmed" [disabled]="loading" required>
            </div>
          </div>

          <div class="ns-two">
            <div class="ns-field">
              <label>Email address</label>
              <input type="email"
                     [(ngModel)]="email"
                     (ngModelChange)="onEmailChange()"
                     name="email"
                     placeholder="you@hospital.com"
                     [disabled]="loading"
                     required>
            </div>

            <div class="ns-field">
              <label>Password</label>
              <div class="ns-pass-wrap">
                <input [type]="showPassword ? 'text' : 'password'"
                       [(ngModel)]="password"
                       (input)="checkPasswordStrength(password)"
                       name="password"
                       placeholder="Min. 8 characters"
                       [disabled]="loading"
                       required>
                <button class="ns-eye" type="button" (click)="showPassword = !showPassword">
                  <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a21.8 21.8 0 015.06-5.94"></path>
                    <path d="M9.9 4.24A10.94 10.94 0 0112 5c7 0 11 7 11 7a21.76 21.76 0 01-3.06 4.06"></path>
                    <path d="M14.12 14.12a3 3 0 01-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                </button>
              </div>
              <div class="ns-strength">
                <span class="seg" [class.weak]="passwordStrength >= 1 && strengthClass === 'weak'" [class.medium]="passwordStrength >= 1 && strengthClass === 'medium'" [class.strong]="passwordStrength >= 1 && strengthClass === 'strong'"></span>
                <span class="seg" [class.weak]="passwordStrength >= 2 && strengthClass === 'weak'" [class.medium]="passwordStrength >= 2 && strengthClass === 'medium'" [class.strong]="passwordStrength >= 2 && strengthClass === 'strong'"></span>
                <span class="seg" [class.weak]="passwordStrength >= 3 && strengthClass === 'weak'" [class.medium]="passwordStrength >= 3 && strengthClass === 'medium'" [class.strong]="passwordStrength >= 3 && strengthClass === 'strong'"></span>
                <span class="seg" [class.weak]="passwordStrength >= 4 && strengthClass === 'weak'" [class.medium]="passwordStrength >= 4 && strengthClass === 'medium'" [class.strong]="passwordStrength >= 4 && strengthClass === 'strong'"></span>
              </div>
              <div class="ns-hint">Use 8+ characters with a mix of letters and numbers</div>
            </div>
          </div>

          <div class="ns-two" *ngIf="selectedRole === 'clinician'">
            <div class="ns-field">
              <label>Clinic / Hospital name</label>
              <input
                type="text"
                [(ngModel)]="clinicName"
                name="clinicName"
                placeholder="City Hospital"
                [disabled]="loading"
                required>
            </div>
            <div class="ns-field">
              <label>License number</label>
              <input
                type="text"
                [(ngModel)]="licenseNumber"
                name="licenseNumber"
                placeholder="PMDC-123456"
                [disabled]="loading"
                required>
            </div>
          </div>

          <div class="ns-field" *ngIf="selectedRole === 'clinician'">
            <label>License document URL (optional)</label>
            <input
              type="url"
              [(ngModel)]="licenseDocumentUrl"
              name="licenseDocumentUrl"
              placeholder="https://.../license.pdf"
              [disabled]="loading">
          </div>

          <label class="ns-terms">
            <input type="checkbox" [(ngModel)]="agreeTerms" name="agreeTerms" [disabled]="loading">
            <span>
              By signing up you agree to our
              <a routerLink="/terms">Terms of Service</a> and
              <a routerLink="/privacy">Privacy Policy</a>
            </span>
          </label>

          <button type="submit" class="ns-submit" [disabled]="loading">
            <span *ngIf="!loading">Create account</span>
            <span *ngIf="loading">Creating account...</span>
          </button>
        </form>

        <div class="ns-login-row">
          Already have an account?
          <button type="button" (click)="openLoginModal()">Sign in →</button>
        </div>
      </div>
    </div>
  </div>
</div>
